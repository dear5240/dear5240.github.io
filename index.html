<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunThinker docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Docsify Theme CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- Favicon (SVG) - 通常放在样式之后 -->
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'YunThinker Docs',
      repo: '',
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      loadNavbar: true, //加载navber方便搜索
      search: {
        // --- 关键修改：使用 'auto' ---
        //paths: 'auto', // 让 Docsify 自动发现需要索引的文件
        paths: '_navbar',
        //paths: ['/', '/docs/'],
        // --------------------------
        placeholder: '搜索',
        noData: '找不到结果',
        // --- 可选：保持 depth 为 6 ---
        depth: 6,
        // --------------------------
      },
    }
  </script>
  <!-- ******* 关键：加载 Docsify 核心库和插件 ******* -->
  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/external-script.min.js"></script>
  <!-- ************************************************ -->
</body>
</html>
